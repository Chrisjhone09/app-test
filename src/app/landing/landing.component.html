<header class="nav" [class.menu-open]="menuOpen">
    <div class="nav-left">
        <img src="logo.png" alt="StudyQuiz" class="logo" />
        <span class="brand">StudyQuiz</span>
    </div>
    <nav class="nav-center">
    </nav>
    <div class="nav-right">
        <button class="hamburger" [class.open]="menuOpen"
                (click)="menuOpen = !menuOpen"
                [attr.aria-expanded]="menuOpen"
                aria-label="Toggle menu">{{ menuOpen ? '✕' : '☰' }}</button>
    </div>
</header>

<!-- mobile nav panel -->
<div class="mobile-menu" [class.visible]="menuOpen" role="navigation" aria-label="Mobile menu">
</div>

<main class="hero">
    <div class="hero-inner">
        <span class="pill">Smarter studying is here</span>

        <h1 class="headline">
            <div class="line-1">Upload your notes.</div>
            <div class="line-2">Master them in minutes.</div>
        </h1>

        <p class="subtitle">Stop re-reading and start testing. StudyQuiz instantly turns your PDFs and notes
            into personalized mock exams.</p>

        <div class="cta-row">
            <button class="btn try" (click)="navigateTo('/generate')">
                Try it for free
                <span class="arrow">→</span>
            </button>
        </div>

        <div class="social-proof">
            <div class="proof-text">Developed by Chris Jhone Radana</div>
        </div>
    </div>
<div id="g_id_onload"
     data-client_id="1011271161253-eqa72uduipnqrll56atet74s56tphcli.apps.googleusercontent.com"
     data-context="signin"
     data-ux_mode="popup"
     data-login_uri="https://chrisjhone.com"
     data-nonce=""
     data-auto_prompt="false">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-shape="rectangular"
     data-theme="outline"
     data-text="signin_with"
     data-size="large"
     data-logo_alignment="left">
</div>
</main>
